<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Welcome to Student Registration Form</h2>
    <form action="thankyou.html">
        <fieldset>

            <legend>Personal Information</legend>
            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name" required placeholder="Full Name"/>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required placeholder="Email"/>

            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" name="phone" required placeholder="Phone Number"/>

            <label for="dob">Date of Birth:</label>
            <input type="date" id="dob" name="dob">

            <label for="cnic">CNIC:</label>
            <input type="text" id="cnic" name="cnic" required placeholder="CNIC"/>

            <p>Gender: </p>
            <label for="male">Male</label>
            <input type="radio" id="male" name="gender" checked>

            <label for="female">Female</label>
            <input type="radio" id="female" name="gender" required>

        </fieldset>

        <fieldset>

            <legend>Academic Information</legend>
            <label for="uni_name">University Name:</label>
            <input type="text" id="uni_name" name="uni_name" required placeholder="University Name"/>

            <label for="degree">Degree:</label>
            <input type="text" id="degree" name="degree" required placeholder="Degree"/>

            <label for="semester">Current Semester:</label>
            <input type="number" id="semester" name="semester" min="1" max="8" required placeholder="Current Semester"/>

            <label for="cgpa">CGPA:</label>
            <input type="number" id="cgpa" name="cgpa" step="0.01" max="4.00" min="0.00" required placeholder="CGPA"/>

            <p>Skills: </p>
            <label for="ML">Machine Learning</label>
            <input type="checkbox" id="ML" name="skills" value="Machine Learning" />
    
            <label for="WD">Web Development</label>
            <input type="checkbox" id="WD" name="skills" value="Web Development" />
            
            <label for="CS">Cybersecurity</label>
            <input type="checkbox" id="CS" name="skills" value="Cybersecurity" />
            
            <label for="AD">App Development</label>
            <input type="checkbox" id="AD" name="skills" value="App Development" />

            <label for="DS">Data Science</label>
            <input type="checkbox" id="DS" name="skills" value="Data Science" />

        </fieldset>

        <fieldset>

            <legend>Account Information</legend>
            <label for="user_name">User Name:</label>
            <input type="text" id="user_name" name="user_name" required placeholder="User Name"/>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required placeholder="Password" maxlength="10"/>

            <label for="confirm_password">Confirm Password:</label>
            <input type="password" id="confirm_password" name="confirm_password" required placeholder="Confirm Password" maxlength="10"/>
        
        </fieldset>
        
        <fieldset>
            <legend>Additional Information</legend>
            <label for="city">City:</label>
            <select id="city" name="city">
                <option value="Karachi">Karachi</option>
                <option value="Lahore">Lahore</option>
                <option value="Islamabad">Islamabad</option>
                <option value="Peshawar">Peshawar</option>
            </select>

            <label for="country">Country:</label>
            <select id="country" name="country">
                <option value="Pakistan">Pakistan</option>
                <option value="India">India</option>
                <option value="USA">USA</option>
                <option value="UK">UK</option>
            </select>

            <label for="file">Upload picture</label>
            <input type="file" id="file" name="file" accept="image/*" />

            <label for='bio'>Bio:</label>
            <textarea id='bio' name='bio' rows='10' cols="30" placeholder="Tell us about yourself"></textarea>

        </fieldset>
        <button type="submit">Submit</button>
        <br>
        <br>
        <button type="reset">Reset</button>
    </form>
</body>
</html>
